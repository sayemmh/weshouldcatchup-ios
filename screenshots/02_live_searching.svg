<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1284" height="2778" fill="#FAF6F1"/>

  <!-- Status Bar -->
  <text x="72" y="78" font-family="Inter, SF Pro, system-ui" font-weight="600" font-size="38" fill="#2C2119">9:41</text>
  <rect x="1120" y="52" width="52" height="28" rx="8" fill="none" stroke="#2C2119" stroke-width="3"/>
  <rect x="1124" y="56" width="40" height="20" rx="5" fill="#2C2119"/>
  <rect x="1172" y="62" width="4" height="10" rx="2" fill="#2C2119"/>

  <!-- Centered content -->
  <!-- Pulsing circles (static representation) -->
  <circle cx="642" cy="700" r="200" fill="#6F4E37" opacity="0.06"/>
  <circle cx="642" cy="700" r="150" fill="#6F4E37" opacity="0.12"/>
  <circle cx="642" cy="700" r="90" fill="#6F4E37"/>

  <!-- Hand wave icon in center circle -->
  <text x="642" y="718" font-family="system-ui" font-size="64" fill="white" text-anchor="middle">&#x1F44B;</text>

  <!-- Looking for someone text -->
  <text x="642" y="980" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="52" fill="#2C2119" text-anchor="middle">Looking for someone...</text>

  <text x="642" y="1040" font-family="Inter, SF Pro, system-ui" font-weight="400" font-size="36" fill="#5C4F44" text-anchor="middle">Sit tight. We're checking your queue.</text>

  <!-- Queue progress section -->
  <text x="460" y="1160" font-family="Inter, SF Pro, system-ui" font-weight="600" font-size="26" fill="#8C7E73" letter-spacing="2">YOUR QUEUE</text>

  <!-- Passed: Sarah (checkmark) -->
  <g transform="translate(460, 1200)">
    <path d="M 4 14 L 10 20 L 22 8" stroke="#8C7E73" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="42" y="18" font-family="Inter, SF Pro, system-ui" font-weight="400" font-size="34" fill="#8C7E73">Sarah</text>
  </g>

  <!-- Passed: Alex (checkmark) -->
  <g transform="translate(460, 1260)">
    <path d="M 4 14 L 10 20 L 22 8" stroke="#8C7E73" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="42" y="18" font-family="Inter, SF Pro, system-ui" font-weight="400" font-size="34" fill="#8C7E73">Alex</text>
  </g>

  <!-- Currently pinging: Jordan (animated dot) -->
  <g transform="translate(460, 1320)">
    <circle cx="12" cy="12" r="8" fill="#6F4E37"/>
    <circle cx="12" cy="12" r="12" fill="#6F4E37" opacity="0.3"/>
    <text x="42" y="18" font-family="Inter, SF Pro, system-ui" font-weight="600" font-size="34" fill="#2C2119">Jordan</text>
  </g>

  <!-- Waiting: Mia (small dot) -->
  <g transform="translate(460, 1380)">
    <circle cx="12" cy="12" r="6" fill="#8C7E73" opacity="0.3"/>
    <text x="42" y="18" font-family="Inter, SF Pro, system-ui" font-weight="400" font-size="34" fill="#5C4F44">Mia</text>
  </g>

  <!-- Waiting: Nate (small dot) -->
  <g transform="translate(460, 1440)">
    <circle cx="12" cy="12" r="6" fill="#8C7E73" opacity="0.3"/>
    <text x="42" y="18" font-family="Inter, SF Pro, system-ui" font-weight="400" font-size="34" fill="#5C4F44">Nate</text>
  </g>

  <!-- Never mind button -->
  <text x="642" y="2620" font-family="Inter, SF Pro, system-ui" font-weight="500" font-size="36" fill="#5C4F44" text-anchor="middle">Never mind</text>

  <!-- Home indicator -->
  <rect x="492" y="2726" width="300" height="10" rx="5" fill="#2C2119" opacity="0.2"/>
</svg>