name: WeShouldCatchUp
options:
  bundleIdPrefix: com.sayem
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    version: "11.6.0"
  AgoraRtcEngine:
    url: https://github.com/AgoraIO/AgoraRtcEngine_iOS
    version: "4.5.0"

targets:
  WeShouldCatchUp:
    type: application
    platform: iOS
    sources:
      - WeShouldCatchUp
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: "We Should Catch Up"
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.sayem.WeShouldCatchUp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 345UAJF999
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseMessaging
      - package: AgoraRtcEngine
        product: RtcBasic
    entitlements:
      path: WeShouldCatchUp/WeShouldCatchUp.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - "applinks:weshouldcatchup.app"
    info:
      path: WeShouldCatchUp/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
          - voip
        NSMicrophoneUsageDescription: "We need microphone access for voice calls with your catch-up connections."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "app-1-395053466295-ios-ff7c07b4d0594750418332"
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-SemiBold.ttf
          - Fraunces-Bold.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
